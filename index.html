<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Devre Arkadaşlarımız - CİK Haritası</title>
    <meta name="description" content="Türkiye genelindeki ceza infaz kurumlarında görev yapan devre arkadaşlarımızın listesi ve haritası.">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-glass: rgba(15, 23, 42, 0.75);
            --border-glass: rgba(100, 200, 255, 0.12);
            --accent: #00d4aa;
            --accent-light: #34ffd2;
            --accent-dim: rgba(0, 212, 170, 0.15);
            --purple: #8b5cf6;
            --purple-dim: rgba(139, 92, 246, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ===== HEADER ===== */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            height: 64px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            gap: 8px;
        }

        .stat-badge {
            background: var(--accent-dim);
            border: 1px solid rgba(0, 212, 170, 0.2);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
        }

        /* ===== NAVIGATION BUTTONS ===== */
        #navigation-bar {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            padding: 10px 16px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav-button {
            flex: 1;
            max-width: 160px;
            padding: 10px 14px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }

        .nav-button:hover {
            background: rgba(0, 212, 170, 0.05);
            color: var(--text-primary);
            border-color: rgba(0, 212, 170, 0.3);
        }

        .nav-button.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 212, 170, 0.15);
        }

        /* ===== MAIN CONTENT AREAS ===== */
        .content-section {
            position: absolute;
            top: 128px;
            bottom: 0;
            left: 0;
            right: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            overflow: hidden;
        }

        .content-section.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== SEARCH BAR FOR LISTS ===== */
        .search-wrapper {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input-box {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .search-input-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
        }

        .search-wrapper i {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ===== ALPHABETICAL LIST SECTION ===== */
        .list-container {
            position: absolute;
            top: 80px;
            bottom: 0;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 0 16px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .list-scroll-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Alphabet index styling */
        .alphabet-divider {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 800;
            color: var(--accent);
            background: rgba(0, 212, 170, 0.05);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .person-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .person-card:hover {
            border-color: rgba(0, 212, 170, 0.3);
            background: rgba(0, 212, 170, 0.02);
        }

        .person-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-dim), var(--purple-dim));
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .person-info {
            flex: 1;
            min-width: 0;
        }

        .person-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .person-detail {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .person-city-tag {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
            flex-shrink: 0;
        }

        /* ===== CITY GROUP SECTION ===== */
        .city-group-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            overflow: hidden;
            transition: var(--transition);
        }

        .city-group-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }

        .city-group-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .city-title-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .city-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .city-badge {
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }

        .city-group-header i.fa-chevron-down {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .city-group-card.open i.fa-chevron-down {
            transform: rotate(180deg);
            color: var(--accent);
        }

        .city-group-content {
            display: none;
            padding: 8px 16px 16px;
            border-top: 1px solid rgba(100, 200, 255, 0.05);
            flex-direction: column;
            gap: 8px;
            background: rgba(10, 14, 26, 0.3);
        }

        .city-group-card.open .city-group-content {
            display: flex;
        }

        /* ===== MAP SECTION ===== */
        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Custom marker */
        .custom-marker {
            background: none;
            border: none;
        }

        .marker-pin {
            width: 36px;
            height: 36px;
            border-radius: 50% 50% 50% 0;
            background: linear-gradient(135deg, var(--accent), #00a88a);
            position: relative;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.4);
            border: 2px solid rgba(255,255,255,0.3);
            animation: markerPulse 2s ease-in-out infinite;
            cursor: pointer;
        }

        .marker-pin .marker-count {
            transform: rotate(45deg);
            font-size: 12px;
            font-weight: 700;
            color: white;
        }

        .marker-pin.multi {
            background: linear-gradient(135deg, var(--purple), #6d28d9);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .marker-pin.large {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        /* Leaflet popup overrides */
        .leaflet-popup-content-wrapper {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-glass) !important;
            border-radius: var(--radius) !important;
            box-shadow: var(--shadow) !important;
            color: var(--text-primary) !important;
            padding: 0 !important;
        }

        .leaflet-popup-tip {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-glass) !important;
        }

        .popup-content {
            padding: 16px;
            min-width: 240px;
            max-width: 280px;
        }

        .popup-city {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .popup-kurum {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-glass);
        }

        .popup-person {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }

        .popup-person + .popup-person {
            border-top: 1px solid rgba(100, 200, 255, 0.06);
        }

        .popup-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-dim), var(--purple-dim));
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
        }

        .popup-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .popup-kurum-name {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .popup-more {
            text-align: center;
            padding-top: 8px;
            margin-top: 4px;
            border-top: 1px solid var(--border-glass);
            font-size: 11px;
            color: var(--accent);
        }

        /* Map controls overrides */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: var(--shadow) !important;
        }

        .leaflet-control-zoom a {
            background: var(--bg-glass) !important;
            backdrop-filter: blur(20px) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-glass) !important;
            transition: var(--transition) !important;
        }

        .leaflet-control-zoom a:hover {
            background: rgba(0, 212, 170, 0.2) !important;
            color: var(--accent) !important;
        }

        /* ===== LOADING ===== */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.4s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-glass);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .no-results i {
            font-size: 32px;
            margin-bottom: 12px;
        }

        /* Responsive modifications */
        @media (max-width: 768px) {
            .nav-button {
                padding: 8px 10px;
                font-size: 12px;
            }
            .header-brand {
                gap: 8px;
            }
            .header-logo {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .header-title {
                font-size: 13px;
            }
        }
    </style>
</head>

    // ===================================================================
    // HELPER FUNCTIONS
    // ===================================================================
    function normalizeText(text) {
        return text.toLowerCase()
            .replace(/[İı]/g, 'i')
            .replace(/ğ/g, 'g')
            .replace(/ü/g, 'u')
            .replace(/ş/g, 's')
            .replace(/ö/g, 'o')
            .replace(/ç/g, 'c');
    }

    function getInitials(name) {
        return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }

    // Grouping helper
    function groupByCity(data) {
        const groups = {};
        data.forEach(d => {
            if (!groups[d.sehir]) groups[d.sehir] = [];
            groups[d.sehir].push(d);
        });
        return groups;
    }

    // ===================================================================
    // RENDER: ALPHABETICAL NAME LIST (İsim & Soyisim)
    // ===================================================================
    function renderNameList(searchTerm = '') {
        const container = document.getElementById('name-list-content');
        
        let filtered = devreler.filter(d => {
            const term = normalizeText(searchTerm);
            return normalizeText(d.ad).includes(term) || normalizeText(d.kurum).includes(term) || normalizeText(d.sehir).includes(term);
        });

        // Sort alphabetically by Name
        filtered.sort((a, b) => a.ad.localeCompare(b.ad, 'tr'));

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <p>Aradığınız kriterde devre arkadaşı bulunamadı.</p>
                </div>
            `;
            return;
        }

        let html = '';
        let currentLetter = '';

        filtered.forEach(person => {
            const firstLetter = person.ad.trim().charAt(0).toUpperCase();
            
            // Add alphabetical divider
            if (firstLetter !== currentLetter) {
                currentLetter = firstLetter;
                html += `<div class="alphabet-divider">${currentLetter}</div>`;
            }

            const initials = getInitials(person.ad);
            html += `
                <div class="person-card">
                    <div class="person-avatar">${initials}</div>
                    <div class="person-info">
                        <div class="person-name">${person.ad}</div>
                        <div class="person-detail">${person.kurum}</div>
                    </div>
                    <div class="person-city-tag">${person.sehir}</div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ===================================================================
    // RENDER: CITY GROUPS (Şehirler)
    // ===================================================================
    function renderCityList(searchTerm = '') {
        const container = document.getElementById('city-list-content');
        
        let filtered = devreler.filter(d => {
            const term = normalizeText(searchTerm);
            return normalizeText(d.ad).includes(term) || normalizeText(d.kurum).includes(term) || normalizeText(d.sehir).includes(term);
        });

        const groups = groupByCity(filtered);
        const sortedCities = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'tr'));

        if (sortedCities.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <p>Aradığınız kriterde şehir veya devre arkadaşı bulunamadı.</p>
                </div>
            `;
            return;
        }

        let html = '';
        sortedCities.forEach(sehir => {
            const kisiler = groups[sehir];
            kisiler.sort((a, b) => a.ad.localeCompare(b.ad, 'tr'));

            html += `
                <div class="city-group-card" id="city-card-${normalizeText(sehir)}">
                    <div class="city-group-header" onclick="toggleCityGroup('${normalizeText(sehir)}')">
                        <div class="city-title-wrapper">
                            <span class="city-title">${sehir}</span>
                            <span class="city-badge">${kisiler.length}</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="city-group-content">
            `;

            kisiler.forEach(p => {
                const initials = getInitials(p.ad);
                html += `
                    <div class="person-card" style="background: rgba(255, 255, 255, 0.02)">
                        <div class="person-avatar">${initials}</div>
                        <div class="person-info">
                            <div class="person-name">${p.ad}</div>
                            <div class="person-detail">${p.kurum}</div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // Accordion Toggle
    window.toggleCityGroup = function(cityId) {
        const card = document.getElementById(`city-card-${cityId}`);
        if (card) {
            card.classList.toggle('open');
        }
    };

    // ===================================================================
    // MAP SETUP & RENDER (Harita)
    // ===================================================================
    let map = null;
    let markerCluster = null;

    function initMap() {
        if (map) return; // Already initialized

        map = L.map('map', {
            center: [39.0, 35.5],
            zoom: 6,
            minZoom: 5,
            maxZoom: 15,
            zoomControl: false,
            attributionControl: true
        });

        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        markerCluster = L.markerClusterGroup({
            maxClusterRadius: 40,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            iconCreateFunction: function(cluster) {
                const count = cluster.getChildCount();
                let size = 'small';
                let dim = 40;
                if (count >= 10) { size = 'large'; dim = 50; }
                else if (count >= 5) { size = 'medium'; dim = 45; }
                return L.divIcon({
                    html: '<div><span>' + count + '</span></div>',
                    className: 'marker-cluster marker-cluster-' + size,
                    iconSize: L.point(dim, dim)
                });
            }
        });

        // Group by City
        const cityGroups = groupByCity(devreler);

        Object.entries(cityGroups).forEach(([sehir, kisiler]) => {
            const coord = ilKoordinatlari[sehir];
            if (!coord) return;

            const count = kisiler.length;
            const markerClass = count >= 5 ? 'large' : (count >= 2 ? 'multi' : '');

            const marker = L.marker(coord, {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: `<div class="marker-pin ${markerClass}"><span class="marker-count">${count}</span></div>`,
                    iconSize: [markerClass === 'large' ? 42 : 36, markerClass === 'large' ? 42 : 36],
                    iconAnchor: [markerClass === 'large' ? 21 : 18, markerClass === 'large' ? 42 : 36],
                    popupAnchor: [0, -(markerClass === 'large' ? 42 : 36)]
                })
            });

            let popupHtml = `
                <div class="popup-content">
                    <div class="popup-city"><i class="fas fa-map-marker-alt"></i>${sehir}</div>
                    <div class="popup-kurum">${count} devre arkadaşı</div>
            `;

            kisiler.forEach(p => {
                const pi = getInitials(p.ad);
                popupHtml += `
                    <div class="popup-person">
                        <div class="popup-avatar">${pi}</div>
                        <div>
                            <div class="popup-name">${p.ad}</div>
                            <div class="popup-kurum-name">${p.kurum}</div>
                        </div>
                    </div>
                `;
            });

            popupHtml += '</div>';
            marker.bindPopup(popupHtml, { maxWidth: 300, closeButton: true });
            markerCluster.addLayer(marker);
        });

        map.addLayer(markerCluster);

        // Fit Turkey bounds
        const turkeyBounds = L.latLngBounds(
            L.latLng(35.8, 25.5),
            L.latLng(42.2, 44.8)
        );
        map.fitBounds(turkeyBounds, { padding: [10, 10] });
    }

    // ===================================================================
    // TABS & EVENT LISTENERS
    // ===================================================================
    document.querySelectorAll('.nav-button').forEach(btn => {
        btn.addEventListener('click', () => {
            // Set active button
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Toggle sections
            const target = btn.dataset.target;
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            
            const activeSection = document.getElementById(target);
            activeSection.classList.add('active');

            // Special actions per mode
            if (target === 'mode-harita') {
                setTimeout(() => {
                    initMap();
                    if (map) map.invalidateSize();
                }, 100);
            }
        });
    });

    // Search events
    document.getElementById('search-isim').addEventListener('input', (e) => {
        renderNameList(e.target.value);
    });

    document.getElementById('search-sehir').addEventListener('input', (e) => {
        renderCityList(e.target.value);
    });

    // Initial load
    window.addEventListener('load', () => {
        renderNameList();
        renderCityList();
        
        // Hide loading
        setTimeout(() => {
            document.getElementById('loading-overlay').classList.add('hidden');
        }, 600);
    });
